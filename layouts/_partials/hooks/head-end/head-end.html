<script>
(function() {
  'use strict';
  
  const isEnglish = window.location.pathname.startsWith('/en/');
  
  const ruTranslations = {
    'Theme': 'Тема оформления',
    'Coffee': 'Кофе',
    'Contrast': 'Контраст',
    'Cupcake': 'Капкейк',
    'Default': 'Стандартная',
    'Dracula': 'Дракула',
    'Marine': 'Морская',
    'Matcha': 'Матча',
    'Minimal': 'Минимализм',
    'Retro': 'Ретро',
    'Solar': 'Солнечная',
    'Synthwave': 'Синтвейв'
  };
  
  function translateThemeSelector() {
    const selector = document.querySelector('select[onchange*="data-theme-pack"]');
    if (!selector) return false;
    
    if (isEnglish) return true;
    
    let translated = 0;
    for (let option of selector.options) {
      const original = option.textContent;
      if (ruTranslations[original]) {
        option.textContent = ruTranslations[original];
        translated++;
      }
    }
    
    if (translated > 0) {
      console.log('Theme selector translated:', translated, 'options');
    }
    return translated > 0;
  }
  
  // Увеличиваем количество попыток до 50 с интервалом 200мс
  let attempts = 0;
  const maxAttempts = 50;
  const intervalTime = 200;
  
  function tryTranslate() {
    if (translateThemeSelector()) return;
    
    attempts++;
    if (attempts < maxAttempts) {
      setTimeout(tryTranslate, intervalTime);
    } else {
      console.warn('Theme selector not found after', maxAttempts, 'attempts');
    }
  }
  
  // Запускаем перевод с задержкой 500мс после полной загрузки
  function startTranslation() {
    attempts = 0;
    setTimeout(tryTranslate, 500);
  }
  
  // Ждём полную загрузку страницы
  if (document.readyState === 'loading') {
    window.addEventListener('load', startTranslation);
  } else {
    startTranslation();
  }
  
  // Дополнительно: следим за появлением селектора
  const observer = new MutationObserver(function(mutations) {
    if (document.querySelector('select[onchange*="data-theme-pack"]')) {
      translateThemeSelector();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
