<script>
(function() {
  'use strict';
  
  const isEnglish = window.location.pathname.startsWith('/en/');
  
  const ruTranslations = {
    'Theme': 'Тема оформления',
    'Coffee': 'Кофе',
    'Contrast': 'Контраст',
    'Cupcake': 'Капкейк',
    'Default': 'Стандартная',
    'Dracula': 'Дракула',
    'Marine': 'Морская',
    'Matcha': 'Матча',
    'Minimal': 'Минимализм',
    'Retro': 'Ретро',
    'Solar': 'Солнечная',
    'Synthwave': 'Синтвейв'
  };
  
  function translateThemeSelector() {
    const selector = document.querySelector('select[onchange*="data-theme-pack"]');
    if (!selector) return false;
    
    // Если уже переведён и не английский — не трогаем
    if (selector.hasAttribute('data-translated')) return true;
    
    // Если английский — не переводим
    if (isEnglish) return true;
    
    let translated = 0;
    for (let option of selector.options) {
      const original = option.textContent;
      if (ruTranslations[original]) {
        option.textContent = ruTranslations[original];
        translated++;
      }
    }
    
    if (translated > 0) {
      selector.setAttribute('data-translated', 'true');
      console.log('Theme selector translated:', translated, 'options');
    }
    
    return translated > 0;
  }
  
  // Функция с повторными попытками
  function tryTranslate(attempt = 1, maxAttempts = 20) {
    if (translateThemeSelector()) return;
    
    if (attempt < maxAttempts) {
      // Увеличиваем интервал с каждой попыткой (50, 100, 150... до 1000мс)
      const delay = Math.min(attempt * 50, 1000);
      setTimeout(function() {
        tryTranslate(attempt + 1, maxAttempts);
      }, delay);
    } else {
      console.warn('Theme selector not found after', maxAttempts, 'attempts');
    }
  }
  
  // Запускаем после полной загрузки страницы
  if (document.readyState === 'loading') {
    window.addEventListener('load', function() {
      setTimeout(tryTranslate, 100);
    });
  } else {
    setTimeout(tryTranslate, 100);
  }
  
  // Также следим за появлением селектора через MutationObserver
  const observer = new MutationObserver(function(mutations) {
    if (document.querySelector('select[onchange*="data-theme-pack"]')) {
      translateThemeSelector();
    }
  });
  
  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
